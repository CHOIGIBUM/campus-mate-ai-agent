name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Validate Claude Code harness
        run: python scripts/validate_harness.py
      - name: Lint
        run: ruff check src tests scripts .claude/hooks
      - name: Compile
        run: python -m compileall -q src tests scripts .claude/hooks
      - name: Test
        run: pytest
      - name: Secret scan
        run: python scripts/scan_secrets.py .
